<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>mltbk</title>
<meta property="og:title" content="mltbk">
<meta property="og:description" content="...">
<meta property="og:type" content="website">
<style>
  @font-face {
    font-family: 'Bebas';
    src: url('fonts/BebasNeue.ttf') format('truetype');
    font-display: block;
  }
  @font-face {
    font-family: 'RussoOne';
    src: url('fonts/RussoOne.ttf') format('truetype');
    font-display: block;
  }
  @font-face {
    font-family: 'PressStart';
    src: url('fonts/PressStart2P.ttf') format('truetype');
    font-display: block;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #scene {
    position: relative;
    height: 100vh;
    width: calc(100vh * 2 / 3);
    max-width: 100vw;
    max-height: calc(100vw * 3 / 2);
    overflow: hidden;
  }

  #bg {
    position: absolute;
    inset: 0;
    background: url('pics_teaser/Background.png') center center / cover no-repeat;
    opacity: 0;
    animation: fadeIn 3s ease-out 0.3s forwards;
  }
  #bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.6) 100%);
  }

  #hero {
    position: absolute;
    inset: 0;
    background: url('pics_teaser/hero_3.png') center center / cover no-repeat;
    opacity: 0;
    z-index: 2;
    filter: brightness(0.2) blur(6px) saturate(0.3);
    transition: opacity 4s ease, filter 4s ease;
  }
  #hero.materializing {
    opacity: 0.4;
    filter: brightness(0.5) blur(3px) saturate(0.6);
  }
  #hero.show {
    opacity: 1;
    filter: brightness(1) blur(0) saturate(1);
  }

  #center-text {
    position: absolute;
    z-index: 10;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'RussoOne', Impact, sans-serif;
    font-size: 9vh;
    color: rgba(255, 240, 230, 0.95);
    text-transform: uppercase;
    text-align: center;
    white-space: nowrap;
    letter-spacing: 0.08em;
    text-shadow:
      0 0 15px rgba(255, 100, 0, 0.6),
      0 2px 6px rgba(0,0,0,0.9);
    opacity: 0;
    user-select: none;
    pointer-events: none;
  }
  #center-text.visible { opacity: 1; }
  #center-text.low { top: 72%; }

  /* Arc title — SVG */
  #title-svg {
    position: absolute;
    z-index: 10;
    top: -7%;
    left: -5%;
    width: 110%;
    height: 35%;
    opacity: 0;
    transition: opacity 2s ease;
    pointer-events: none;
  }
  #title-svg.show { opacity: 1; }

  #title-svg text {
    font-family: 'RussoOne', Impact, sans-serif;
    font-size: 140px;
    fill: url(#rustGrad);
    stroke: #1a0a00;
    stroke-width: 4px;
    paint-order: stroke fill;
    filter: url(#titleGlow);
    letter-spacing: 2px;
  }
  /* Smaller loop text style */
  #title-svg.loop-text text {
    font-size: 90px;
    fill: rgba(255, 240, 230, 0.95);
    stroke: rgba(0,0,0,0.7);
    stroke-width: 3px;
  }

  /* Flat centered text for loop (no arc) */
  #loop-text-flat {
    position: absolute;
    z-index: 10;
    top: 5%;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'RussoOne', Impact, sans-serif;
    font-size: 4vh;
    color: rgba(255, 240, 230, 0.95);
    text-transform: uppercase;
    text-align: center;
    white-space: nowrap;
    text-shadow:
      0 0 15px rgba(255, 100, 0, 0.7),
      0 0 40px rgba(255, 50, 0, 0.4),
      0 3px 8px rgba(0,0,0,0.9);
    opacity: 0;
    transition: opacity 1s ease;
    user-select: none;
    pointer-events: none;
  }
  #loop-text-flat.show { opacity: 1; }

  /* CTA Button */
  #cta-btn {
    position: absolute;
    z-index: 12;
    top: 72%;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'PressStart', monospace;
    font-size: 2vh;
    color: #000;
    background: linear-gradient(180deg, #ffd080, #ff8c20);
    padding: 1.5vh 3vh;
    border: 3px solid #ff6600;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    box-shadow:
      0 0 20px rgba(255, 100, 0, 0.6),
      0 0 60px rgba(255, 50, 0, 0.3),
      0 4px 12px rgba(0,0,0,0.8);
    opacity: 0;
    transition: opacity 1s ease, transform 0.2s ease, box-shadow 0.2s ease;
    user-select: none;
    white-space: nowrap;
  }
  #cta-btn.show { opacity: 1; }
  #cta-btn:hover {
    transform: translateX(-50%) scale(1.05);
    box-shadow:
      0 0 30px rgba(255, 100, 0, 0.8),
      0 0 80px rgba(255, 50, 0, 0.5),
      0 4px 12px rgba(0,0,0,0.8);
  }
  #cta-btn:active {
    transform: translateX(-50%) scale(0.97);
  }

  #motto {
    position: absolute;
    z-index: 10;
    bottom: 3%;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'PressStart', monospace;
    font-size: 2.5vh;
    color: rgba(255, 200, 150, 0.9);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    text-shadow:
      0 0 15px rgba(255, 100, 0, 0.6),
      0 2px 6px rgba(0,0,0,0.9);
    opacity: 0;
    transition: opacity 2s ease;
    white-space: nowrap;
    user-select: none;
  }
  #motto.show { opacity: 1; }

  #flash {
    position: absolute;
    inset: 0;
    background: rgba(255, 150, 50, 0.4);
    z-index: 20;
    opacity: 0;
    pointer-events: none;
  }
  #flash.fire { animation: flashBang 0.5s ease-out forwards; }

  #scanlines {
    position: absolute;
    inset: 0;
    z-index: 15;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
  }

  .letterbox {
    position: absolute;
    left: 0; right: 0;
    height: 2%;
    background: #000;
    z-index: 25;
  }
  .letterbox.top { top: 0; }
  .letterbox.bottom { bottom: 0; }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(1.05); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes wordIn {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(1.8); filter: blur(8px); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0); }
  }
  @keyframes flashBang {
    0% { opacity: 0.6; }
    100% { opacity: 0; }
  }
  @keyframes bgPulse {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.15); }
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }
  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(255,100,0,0.6), 0 0 60px rgba(255,50,0,0.3), 0 4px 12px rgba(0,0,0,0.8); }
    50% { box-shadow: 0 0 30px rgba(255,100,0,0.9), 0 0 80px rgba(255,50,0,0.5), 0 4px 12px rgba(0,0,0,0.8); }
  }

  #hero.idle { animation: breathe 4s ease-in-out infinite; }
  #bg.pulse { animation: bgPulse 3s ease-in-out infinite; }
  #cta-btn.pulse { animation: btnPulse 1.5s ease-in-out infinite; }

  /* 18+ badge */
  #age-badge {
    position: absolute;
    z-index: 30;
    top: 3%;
    right: 3%;
    width: 5vh;
    height: 5vh;
    border: 2px solid rgba(255, 255, 255, 0.7);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'RussoOne', Impact, sans-serif;
    font-size: 1.6vh;
    color: rgba(255, 255, 255, 0.4);
    background: rgba(0, 0, 0, 0.3);
    user-select: none;
    pointer-events: none;
    opacity: 1;
    transition: opacity 2s ease;
  }
  #age-badge.fade { opacity: 0; }

  /* Mobile: when width is the constraint */
  @media (max-aspect-ratio: 2/3) {
    #center-text { font-size: 12vw; }
    #loop-text-flat { font-size: 5vw; }
    #cta-btn { font-size: 2.8vw; padding: 2vw 4vw; }
    #motto { font-size: 3.2vw; }
    #age-badge { width: 7vw; height: 7vw; font-size: 2.2vw; }
  }

  #particles {
    position: absolute;
    inset: 0;
    z-index: 11;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="scene">
  <div id="bg"></div>
  <div id="hero"></div>
  <canvas id="particles"></canvas>
  <div id="center-text"></div>

  <svg id="title-svg" viewBox="-200 -20 1424 500" preserveAspectRatio="xMidYMid meet">
    <defs>
      <path id="arc" d="M -80,420 Q 512,20 1104,420" fill="none"/>
      <linearGradient id="rustGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#d4843e"/>
        <stop offset="40%" stop-color="#b85a1a"/>
        <stop offset="70%" stop-color="#8b3a0f"/>
        <stop offset="100%" stop-color="#5c2208"/>
      </linearGradient>
      <filter id="titleGlow">
        <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ff5500" flood-opacity="0.7"/>
        <feDropShadow dx="0" dy="0" stdDeviation="15" flood-color="#ff2200" flood-opacity="0.4"/>
        <feDropShadow dx="0" dy="3" stdDeviation="1" flood-color="#000" flood-opacity="0.9"/>
      </filter>
    </defs>
    <text>
      <textPath id="title-text" href="#arc" startOffset="50%" text-anchor="middle">МУЛЬТИЕБАКА</textPath>
    </text>
  </svg>

  <div id="loop-text-flat"></div>
  <div id="cta-btn">УЗНАТЬ ПРАВДУ</div>
  <div id="motto">А ЗНАЕШЬ ЛИ ТЫ КТО ТЫ?</div>
  <div id="flash"></div>
  <div id="scanlines"></div>
  <div class="letterbox top"></div>
  <div class="letterbox bottom"></div>
  <div id="age-badge">18+</div>
</div>

<script>
const $ = id => document.getElementById(id);
const centerText = $('center-text');
const hero = $('hero');
const titleSvg = $('title-svg');
const titleText = $('title-text');
const ctaBtn = $('cta-btn');
const loopText = $('loop-text-flat');
const motto = $('motto');
const flash = $('flash');
const bg = $('bg');
const ageBadge = $('age-badge');
const canvas = $('particles');
const ctx = canvas.getContext('2d');

let particles = [];
let animRunning = false;

function resizeCanvas() {
  const scene = $('scene');
  canvas.width = scene.offsetWidth;
  canvas.height = scene.offsetHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function spawnBurst(cx, cy, count) {
  // Тёмные, агрессивные цвета — угли, искры, пепел
  const colors = [
    [255, 80, 0],    // тёмно-оранжевый
    [200, 50, 0],    // ржавый
    [255, 40, 0],    // багровый
    [150, 30, 0],    // тлеющий уголь
    [255, 120, 20],  // искра
    [100, 20, 0],    // угасающий
    [255, 160, 40],  // редкая яркая искра
  ];
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 6;
    const c = colors[Math.floor(Math.random() * colors.length)];
    const isEmber = Math.random() > 0.6; // тлеющий уголёк
    particles.push({
      x: cx + (Math.random() - 0.5) * 30,
      y: cy + (Math.random() - 0.5) * 20,
      vx: Math.cos(angle) * speed * (isEmber ? 0.5 : 1),
      vy: Math.sin(angle) * speed - 1 + (isEmber ? -Math.random() * 3 : 0),
      life: 1,
      decay: isEmber ? 0.003 + Math.random() * 0.005 : 0.008 + Math.random() * 0.015,
      size: isEmber ? 0.5 + Math.random() * 1.5 : 1 + Math.random() * 2.5,
      r: c[0], g: c[1], b: c[2],
      trail: !isEmber && Math.random() > 0.4,
      flicker: isEmber,
    });
  }
  if (!animRunning) {
    animRunning = true;
    animateParticles();
  }
}

// 15 залпов как петарды
async function spawnSalute() {
  resizeCanvas();
  const w = canvas.width;
  const h = canvas.height;
  for (let i = 0; i < 15; i++) {
    const cx = w * (0.1 + Math.random() * 0.8);
    const cy = h * (0.03 + Math.random() * 0.15);
    spawnBurst(cx, cy, 60 + Math.floor(Math.random() * 40));
    await new Promise(r => setTimeout(r, 80 + Math.random() * 120));
  }
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.globalCompositeOperation = 'lighter'; // аддитивное смешивание — огненный эффект
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.vx *= 0.98;
    p.life -= p.decay;

    if (p.life <= 0) {
      particles.splice(i, 1);
      continue;
    }

    // Мерцание для угольков
    let a = p.life;
    if (p.flicker) {
      a *= 0.5 + 0.5 * Math.sin(Date.now() * 0.01 + i * 7);
    }
    a = Math.max(0, a);

    // Тусклое свечение
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${(a * 0.08).toFixed(3)})`;
    ctx.fill();

    // Ядро
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${(a * 0.7).toFixed(3)})`;
    ctx.fill();

    // Дымный хвост
    if (p.trail) {
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx * 5, p.y - p.vy * 5);
      ctx.strokeStyle = `rgba(${p.r >> 1},${p.g >> 1},${p.b >> 1},${(a * 0.3).toFixed(3)})`;
      ctx.lineWidth = p.size * 0.8;
      ctx.stroke();
    }
  }

  ctx.globalCompositeOperation = 'source-over';

  if (particles.length > 0) {
    requestAnimationFrame(animateParticles);
  } else {
    animRunning = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

function showWord(text, low) {
  centerText.classList.toggle('low', !!low);
  centerText.textContent = text;
  centerText.style.transition = 'none';
  centerText.style.animation = 'none';
  centerText.offsetHeight;
  centerText.style.animation = 'wordIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards';
  centerText.classList.add('visible');
}

function fadeOutWord(duration) {
  const ms = duration || 1000;
  return new Promise(resolve => {
    centerText.style.animation = 'none';
    centerText.style.transform = 'translate(-50%, -50%)';
    centerText.style.transition = `opacity ${ms}ms ease`;
    centerText.offsetHeight;
    centerText.classList.remove('visible');
    setTimeout(() => {
      centerText.textContent = '';
      resolve();
    }, ms);
  });
}

function fadeInWord(text, low) {
  centerText.classList.toggle('low', !!low);
  centerText.textContent = text;
  centerText.style.animation = 'none';
  centerText.style.transform = 'translate(-50%, -50%)';
  centerText.style.transition = 'opacity 1s ease';
  centerText.offsetHeight;
  centerText.classList.add('visible');
}

function fireFlash() {
  flash.classList.remove('fire');
  flash.offsetHeight;
  flash.classList.add('fire');
}

function setTitle(text) {
  titleText.textContent = text;
}

function waitForClick(el) {
  return new Promise(resolve => {
    el.addEventListener('click', resolve, { once: true });
  });
}

function showBtn(text) {
  ctaBtn.textContent = text;
  ctaBtn.classList.add('show', 'pulse');
}

function hideBtn() {
  return new Promise(resolve => {
    ctaBtn.classList.remove('show', 'pulse');
    setTimeout(() => {
      ctaBtn.style.whiteSpace = '';
      ctaBtn.style.textAlign = '';
      ctaBtn.style.fontSize = '';
      ctaBtn.style.lineHeight = '';
      resolve();
    }, 500);
  });
}

function showLoopText(text) {
  loopText.innerHTML = text;
  loopText.classList.add('show');
}

function hideLoopText() {
  return new Promise(resolve => {
    loopText.classList.remove('show');
    setTimeout(resolve, 1000);
  });
}

async function interactiveLoop() {
  // 1. Плашка "УЗНАТЬ ПРАВДУ"
  showBtn('УЗНАТЬ ПРАВДУ');
  await waitForClick(ctaBtn);
  await hideBtn();

  // "ПОГОДИ!"
  showLoopText('ПОГОДИ!');
  await sleep(2000);
  await hideLoopText();

  // 2. "СКАЖИ ПРАВДУ!"
  showBtn('СКАЖИ ПРАВДУ!');
  await waitForClick(ctaBtn);
  await hideBtn();

  // "СЕЙЧАС, ПОГОДЬ!"
  showLoopText('СЕЙЧАС, ПОГОДЬ!');
  await sleep(2000);
  await hideLoopText();

  // 3. "ГОВОРИ, ЗАЕБАЛ!"
  showBtn('ГОВОРИ, ЗАЕБАЛ!');
  await waitForClick(ctaBtn);
  await hideBtn();

  // "ТВОЙ МИР БУДЕТ РАЗЪЁБАН"
  showLoopText('ТВОЙ МИР БУДЕТ РАЗЪЁБАН');
  await sleep(2000);

  // Плавно исчезает, пауза, потом "ИЛИ НЕТ.."
  await hideLoopText();
  await sleep(1000);
  showLoopText('ИЛИ НЕТ..');
  await sleep(2000);

  // 4. "ДА КТО ТЫ, БЛЯТЬ, ТАКОЙ?"
  await hideLoopText();
  showBtn('ДА КТО ТЫ, БЛЯТЬ, ТАКОЙ?');
  await waitForClick(ctaBtn);
  await hideBtn();

  // 5. "ТЫ ПРАВДА ХОЧЕШЬ ЗНАТЬ?"
  showLoopText('ТЫ ПРАВДА ХОЧЕШЬ ЗНАТЬ?');
  await sleep(2000);
  await hideLoopText();

  showBtn('ХОЧУ!');
  await waitForClick(ctaBtn);
  await hideBtn();

  // 6. "А ЗНАЕШЬ ЛИ ТЫ КТО ТЫ?"
  showLoopText('А ЗНАЕШЬ ЛИ ТЫ КТО ТЫ?');
  await sleep(2000);
  await hideLoopText();

  ctaBtn.innerHTML = 'ТЫ ОПЯТЬ ЗАЕБАЛ!<br>ОТВЕЧАЙ КТО ТЫ!';
  ctaBtn.style.whiteSpace = 'nowrap';
  ctaBtn.style.fontSize = '1.8vh';
  ctaBtn.style.lineHeight = '2.5';
  ctaBtn.style.textAlign = 'center';
  ctaBtn.classList.add('show', 'pulse');
  await waitForClick(ctaBtn);
  await hideBtn();

  // Заголовок МУЛЬТИЕБАКА + салют
  fireFlash();
  spawnSalute();
  setTitle('МУЛЬТИЕБАКА');
  titleSvg.classList.remove('loop-text');
  titleSvg.classList.add('show');
  await sleep(500);
  motto.classList.add('show');
  await sleep(7000);

  // Убираем заголовок и слоган
  titleSvg.classList.remove('show');
  motto.classList.remove('show');
  await sleep(2000); // ждём fade out
  await sleep(2000); // пауза перед новой петлёй

  interactiveLoop();
}

async function runTeaser() {
  await sleep(3500);

  // Fade out 18+ badge after background appeared
  ageBadge.classList.add('fade');

  // ТВОЙ МИР — БУДЕТ
  const words = ['ТВОЙ МИР', 'БУДЕТ'];
  for (const word of words) {
    fireFlash();
    showWord(word, false);
    await sleep(900);
    await fadeOutWord(600);
    await sleep(200);
  }

  // РАЗЪЁБАН
  fireFlash();
  showWord('РАЗЪЁБАН', false);
  await sleep(2000);
  await fadeOutWord(1200);
  await sleep(400);

  // ИЛИ НЕТ?
  fadeInWord('ИЛИ НЕТ?', true);
  await sleep(2000);

  // Hero materializes while ИЛИ НЕТ? is still visible
  hero.classList.add('materializing');
  await sleep(2000);
  fireFlash();
  hero.classList.remove('materializing');
  hero.classList.add('show');
  await sleep(2000);

  // ИЛИ НЕТ? fades out
  await fadeOutWord(1500);

  // Idle
  hero.classList.add('idle');
  bg.classList.add('pulse');

  // Straight to interactive loop (no title, no motto yet)
  await sleep(500);
  interactiveLoop();
}

Promise.all([
  new Promise(r => { const i = new Image(); i.onload = r; i.src = 'pics_teaser/Background.png'; }),
  new Promise(r => { const i = new Image(); i.onload = r; i.src = 'pics_teaser/hero_3.png'; }),
]).then(runTeaser);
</script>
</body>
</html>
